<!-- 1. ST 좌측 메뉴에 삽입될 버튼 -->
<div id="cmp-open-btn-wrapper" style="display:none;">
    <div id="cmp-open-btn" class="menu_button" title="Character Music Player">
        <i class="fa-solid fa-music"></i> Music Player 설정
    </div>
</div>

<!-- 2. 화면에 떠오르는 모노톤 플로팅 패널 -->
<div id="cmp-panel">
    <div id="cmp-panel-inner">
        <!-- 헤더 -->
        <div id="cmp-panel-header">
            <div id="cmp-panel-title">
                <i class="fa-solid fa-headphones"></i> Music Player Settings
            </div>
            <button id="cmp-panel-close"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <!-- 본문 -->
        <div id="cmp-panel-body">
            
            <!-- 활성화 토글 -->
            <div class="cmp-row-toggle">
                <span class="cmp-row-label">뮤직 플레이어 켜기</span>
                <label class="cmp-switch">
                    <input type="checkbox" id="cmp-enabled" />
                    <span class="cmp-switch-track"></span>
                </label>
            </div>

            <!-- YouTube API 키 -->
            <div class="cmp-section">
                <div class="cmp-label">YouTube Data API 키</div>
                <input type="text" id="cmp-apikey" class="cmp-input" placeholder="AIza... (입력하지 않아도 동작)" autocomplete="off" />
                <div class="cmp-hint">
                    🎵 <b>키 있음</b> — 앨범아트 표시, ▶ 클릭 시 YouTube 재생<br>
                    🔗 <b>키 없음</b> — 앨범아트 생략, ▶ 클릭 시 YouTube 검색 열림
                </div>
            </div>

            <!-- 쿨다운 -->
            <div class="cmp-section">
                <div class="cmp-label">카드 팝업 최소 간격</div>
                <div class="cmp-inline">
                    <input type="number" id="cmp-cooldown" class="cmp-input cmp-input-sm" min="1" max="60" value="3" />
                    <span class="cmp-unit">분 마다</span>
                </div>
            </div>

            <!-- 트리거 민감도 -->
            <div class="cmp-section">
                <div class="cmp-label">음악 재생 민감도</div>
                <select id="cmp-sensitivity" class="cmp-select">
                    <option value="low">낮음 (단어 2개 이상 일치)</option>
                    <option value="medium" selected>보통 (단어 1개 일치)</option>
                    <option value="high">높음 (AI가 맥락 직접 판단)</option>
                </select>
            </div>

            <!-- 카드 디자인 -->
            <div class="cmp-section">
                <div class="cmp-label">플레이어 디자인</div>
                <select id="cmp-cardstyle" class="cmp-select">
                    <option value="full">1. 풀카드 (앨범아트 보임)</option>
                    <option value="mini">2. LP판 (앨범아트 보임)</option>
                    <option value="text">3. 에어팟 (앨범아트 안 보임)</option>
                    <option value="retro">4. 레트로 (앨범아트 안 보임)</option>
                </select>
            </div>

            <!-- 테스트 버튼 -->
            <button id="cmp-test-btn"><i class="fa-solid fa-play"></i> 화면 출력 미리보기</button>
            
        </div>
    </div>
</div>
