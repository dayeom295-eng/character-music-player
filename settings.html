<div id="cmp-panel">
    <div id="cmp-panel-inner">

        <!-- Header -->
        <div id="cmp-panel-header">
            <div id="cmp-panel-title">
                <div id="cmp-eq" aria-hidden="true">
                    <span></span><span></span><span></span><span></span>
                </div>
                Character Music Player
            </div>
            <button id="cmp-panel-close" title="닫기">✕</button>
        </div>

        <!-- Body -->
        <div id="cmp-panel-body">

            <!-- 활성화 -->
            <div class="cmp-row-toggle">
                <span class="cmp-row-label">확장 활성화</span>
                <label class="cmp-switch">
                    <input type="checkbox" id="cmp-enabled" />
                    <span class="cmp-switch-track"></span>
                </label>
            </div>

            <div class="cmp-sep"></div>

            <!-- YouTube API 키 -->
            <div class="cmp-section">
                <div class="cmp-label">YouTube Data API 키</div>
                <input type="text" id="cmp-apikey" class="cmp-input" placeholder="AIza... (없어도 동작)" autocomplete="off" />
                <div class="cmp-note">
                    <div>🎵 <b>키 있음</b> — 앨범아트 표시, ▶ 클릭 시 YouTube 재생</div>
                    <div>🔗 <b>키 없음</b> — ▶ 클릭 시 YouTube 검색 열림</div>
                </div>
            </div>

            <!-- 카드 표시 간격 -->
            <div class="cmp-section">
                <div class="cmp-label">카드 표시 최소 간격</div>
                <div class="cmp-inline">
                    <input type="number" id="cmp-cooldown" class="cmp-input cmp-input-sm" min="1" max="60" value="3" />
                    <span class="cmp-unit">분</span>
                </div>
            </div>

            <!-- 트리거 민감도 -->
            <div class="cmp-section">
                <div class="cmp-label">트리거 민감도</div>
                <select id="cmp-sensitivity" class="cmp-select">
                    <option value="low">낮음 (키워드 2개 이상)</option>
                    <option value="medium" selected>보통 (키워드 1개)</option>
                    <option value="high">높음 (AI가 직접 판단)</option>
                </select>
                <div class="cmp-note">
                    <div>🎯 <b>높음</b> = AI가 매 응답마다 상황 직접 판단</div>
                </div>
            </div>

            <!-- 카드 디자인 -->
            <div class="cmp-section">
                <div class="cmp-label">카드 디자인</div>
                <select id="cmp-cardstyle" class="cmp-select">
                    <option value="full">풀카드 (앨범아트 보임)</option>
                    <option value="mini">LP판 (앨범아트 보임)</option>
                    <option value="text">에어팟 (앨범아트 안 보임)</option>
                    <option value="retro">레트로 (앨범아트 안 보임)</option>
                </select>
            </div>

            <div class="cmp-sep"></div>

            <!-- 테스트 버튼 -->
            <button id="cmp-test-btn">🎵 화면 출력 테스트 (미리보기)</button>

        </div>
    </div>
</div>
